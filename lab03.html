<html>

<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styling.css">
</head>

<body>
    <header id="bar">
        <h1>Lab 3: Rock Paper Scissors Game</h1>
    </header>

    <nav id="main-nav">
        <ul>
            <li><a href="https://www.google.com" target="_blank">Google</a></li>
            <li><a href="https://testudo.umd.edu/" target="_blank">Testudo</a></li>
            <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="content-area">
            <div class="content-box">
                <h2>Please choose one of the following</h2>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" required>
                    <label for="choice">Choice:</label>
                    <select id="choice">
                        <option>Rock</option>
                        <option>Paper</option>
                        <option>Scissors</option>
                    </select>
                    <input type="submit" value="Play">
                </form>
            </div>
        </div>

        <aside id="rules">
            <h1>Rules</h1>
            <h2>You have to choose rock, paper, or scissors</h2>
                <p>These are your possible combos:</p>
                <ul>
                    <li>Rock beats Scissors</li>
                    <li>Scissors beats Paper</li>
                    <li>Paper beats Rock</li>
                </ul>
        </aside>
    </div>

    <!-- Footer -->
    <footer id="bar">
        <p>Lab 3 Copyright</p>
    </footer>
</body>

</html>
